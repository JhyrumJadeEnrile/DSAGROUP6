<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${dsName} + ' - DSA Visualizer'">DSA Visualizer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>🎓 DSA Visualizer</h2>
            </div>
            <div class="nav-links">
                <span class="nav-section-label">Data Structures</span>
                <a th:each="entry : ${structures}" 
                   th:href="@{'/ds/' + ${entry.key}}" 
                   th:classappend="${entry.key == currentDs} ? 'active' : ''"
                   class="nav-link">
                    <span class="nav-icon" th:text="${entry.value.icon}">📚</span>
                    <span class="nav-text" th:text="${entry.value.title}">Stack</span>
                </a>
                <span class="nav-divider">|</span>
                <span class="nav-section-label">Algorithms</span>
                <a th:each="entry : ${algorithms}" 
                   th:href="@{'/ds/' + ${entry.key}}" 
                   th:classappend="${entry.key == currentDs} ? 'active' : ''"
                   class="nav-link algo-link">
                    <span class="nav-icon" th:text="${entry.value.icon}">🔍</span>
                    <span class="nav-text" th:text="${entry.value.title}">Search</span>
                </a>
            </div>
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                <span class="hamburger"></span>
                <span class="hamburger"></span>
                <span class="hamburger"></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Navigation Menu -->
    <div class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-section-label">📦 Data Structures</div>
        <a th:each="entry : ${structures}" 
           th:href="@{'/ds/' + ${entry.key}}" 
           th:classappend="${entry.key == currentDs} ? 'active' : ''"
           class="mobile-nav-link"
           onclick="toggleMobileMenu()">
            <span th:text="${entry.value.icon}">📚</span>
            <span th:text="${entry.value.title}">Stack</span>
        </a>
        <div class="mobile-nav-section-label">⚙️ Algorithms</div>
        <a th:each="entry : ${algorithms}" 
           th:href="@{'/ds/' + ${entry.key}}" 
           th:classappend="${entry.key == currentDs} ? 'active' : ''"
           class="mobile-nav-link"
           onclick="toggleMobileMenu()">
            <span th:text="${entry.value.icon}">🔍</span>
            <span th:text="${entry.value.title}">Search</span>
        </a>
    </div>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Video Header -->
            <div class="video-header">
                <h1 class="video-title">
                    <span class="title-icon" th:text="${icon}">📚</span>
                    <span th:text="${dsName}">Stack</span>
                </h1>
                <p class="video-description" th:text="${description}">
                    Last In First Out (LIFO) data structure
                </p>
            </div>

            <!-- Video Player Section -->
            <div class="video-section">
                <div class="video-container">
                    <video id="mainVideo" 
                           controls 
                           controlsList="nodownload"
                           th:src="@{'/videos/' + ${videoFile}}"
                           autoplay>
                        Your browser does not support the video tag.
                    </video>
                </div>

                <!-- Video Control Buttons -->
                <div class="control-panel">
                    <button class="control-btn" onclick="restartVideo()">
                        ↻ Restart
                    </button>
                    <button class="control-btn" onclick="adjustSpeed()">
                        <span id="speedText">⚡ 1.0x</span>
                    </button>
                    <button class="control-btn" onclick="toggleFullscreen()">
                        ⛶ Fullscreen
                    </button>
                </div>
            </div>

            <!-- Information Card -->
            <div class="info-section">
                <div class="info-card">
                    <h3>About <span th:text="${dsName}">Stack</span></h3>
                    <p th:text="${description}">Last In First Out (LIFO) data structure</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 DSA GROUP 6 |
           <span th:text="${#maps.size(structures)}">10</span> Data Structures &amp;
           <span th:text="${#maps.size(algorithms)}">9</span> Algorithms Available
        </p>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
